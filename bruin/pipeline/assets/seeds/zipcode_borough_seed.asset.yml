
name: seeds.zipcode_borough
type: bq.seed

# Path to the CSV file (relative to this .asset.yml file).
# Can also be a URL: https://example.com/data.csv
parameters:
  path: zipcode_borough.csv

# TODO: Define columns and add quality checks.
# - Lookups should have a stable primary key.
columns:
  - name: zipcode
    type: INTEGER
    description: ZIP code of the location.
    checks:
      - name: not_null
      - name: unique
      
  - name: borough
    type: STRING
    description: Borough where the ZIP code is located.
    checks:
      - name: not_null
